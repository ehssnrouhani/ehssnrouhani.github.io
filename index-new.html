  <p class="text-center text-gray-500 text-sm mb-6">مبتنی بر مدل ریاضی ACT‑R، یادگیری بیزی، RL و فشرده‌سازی (MDL)</p>

  </div>

  <!-- محتوای تب‌ها -->
  <div id="tabContent" class="bg-white rounded-2xl shadow p-6 min-h-[500px]">
    <!-- محتوا با JavaScript پر می‌شود -->

<script>
// ======================== پایگاه داده و پارامترها ========================
const STORAGE_KEY = 'konkoor_topics_v2';
const PREMIUM_KEY = 'premium_unlocked';
let topics = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let examDate = localStorage.getItem('examDate') || '';
let premium = localStorage.getItem(PREMIUM_KEY) === 'true';

// پارامترهای مدل شناختی
const ALPHA_DEFAULT = 0.25;   // شیب فراموشی
const GAMMA_DEFAULT = 0.5;    // مقیاس
const SLIP = 0.1;            // احتمال لغزش
const GUESS = 0.25;          // حدس (چهار گزینه‌ای)
const REWARD_ZONE = [0.60, 0.85]; // منطقه طلایی RL

// ======================== مباحث پیش‌فرض کنکور ========================
const DEFAULT_TOPICS = [
  // ریاضی
  {name:"مجموعه و الگوها", cat:"ریاضی"},
  {name:"مثلثات", cat:"ریاضی"},
  {name:"حد و پیوستگی", cat:"ریاضی"},
  {name:"مشتق و کاربرد", cat:"ریاضی"},
  {name:"انتگرال", cat:"ریاضی"},
  {name:"احتمال", cat:"ریاضی"},
  {name:"آمار", cat:"ریاضی"},
  {name:"هندسه", cat:"ریاضی"},
  // فیزیک
  {name:"حرکت شناسی", cat:"فیزیک"},
  {name:"دینامیک", cat:"فیزیک"},
  {name:"نوسان و موج", cat:"فیزیک"},
  {name:"الکتریسیته", cat:"فیزیک"},
  {name:"مغناطیس", cat:"فیزیک"},
  {name:"فیزیک اتمی", cat:"فیزیک"},
  // شیمی
  {name:"استوکیومتری", cat:"شیمی"},
  {name:"ترموشیمی", cat:"شیمی"},
  {name:"سینتیک", cat:"شیمی"},
  {name:"تعادل", cat:"شیمی"},
  {name:"اسید و باز", cat:"شیمی"},
  {name:"آلی", cat:"شیمی"},
  // زیست
  {name:"زیست سلولی", cat:"زیست"},
  {name:"ژنتیک", cat:"زیست"},
  {name:"گیاهی", cat:"زیست"},
  {name:"جانوری", cat:"زیست"},
  {name:"بدن انسان", cat:"زیست"},
  // عمومی
  {name:"آرایه ادبی", cat:"عمومی"},
  {name:"قرابت معنایی", cat:"عمومی"},
  {name:"لغت و املا", cat:"عمومی"},
  {name:"دین و زندگی", cat:"عمومی"},
  {name:"زبان انگلیسی", cat:"عمومی"},
];

// ======================== توابع مدل ریاضی ========================
function decayedMastery(topic, now = Date.now()) {
  if (!topic.lastStudy) return topic.mastery;
  const dt = (now - topic.lastStudy) / (1000 * 60 * 60 * 24); // روز
  if (dt <= 0) return topic.mastery;
  const a = topic.alpha || ALPHA_DEFAULT;
  const g = topic.gamma || GAMMA_DEFAULT;
  return topic.mastery / Math.pow(1 + g * dt, a);
}

function bayesUpdate(prior, correct, rtSec = 3) {
  const pCorrGivenMastered = 1 - SLIP;
  const pCorrGivenNotMastered = GUESS;
  let likelihood;
  if (correct) {
    likelihood = pCorrGivenMastered / pCorrGivenNotMastered;
  } else {
    likelihood = (1 - pCorrGivenMastered) / (1 - pCorrGivenNotMastered);
  }
  // وزن سرعت پاسخ
  const speed = Math.min(1.5, Math.max(0.5, 2 / rtSec));
  const adjLikelihood = Math.pow(likelihood, speed);
  const odds = prior / (1 - prior) * adjLikelihood;
  return odds / (1 + odds);
}

function study(topic, correct, rtSec = 2) {
  const now = Date.now();
  const current = decayedMastery(topic, now);
  topic.mastery = Math.min(0.99, Math.max(0.01, bayesUpdate(current, correct, rtSec)));
  topic.lastStudy = now;
  if (!topic.history) topic.history = [];
  topic.history.push({date: now, correct, rt: rtSec});
  // به‌روزرسانی پارامتر فراموشی (ساده‌شده)
  if (topic.history.length >= 5) {
    const lastTwo = topic.history.slice(-2);
    const dt = (lastTwo[1].date - lastTwo[0].date) / 86400000;
    if (dt > 0.1) {
      const retention = topic.mastery; // بعد از مرور
      topic.alpha = Math.max(0.1, Math.min(0.8, -Math.log(retention)/Math.log(1+GAMMA_DEFAULT*dt)));
    }
  }
  saveData();
}

// اولویت یک مبحث برای مطالعه (امتیاز)
function priority(topic, now = Date.now()) {
  const p = decayedMastery(topic, now);
  const daysSince = topic.lastStudy ? (now - topic.lastStudy)/86400000 : 999;
  const toExam = examDate ? Math.max(1, (new Date(examDate) - now)/86400000) : 100;
  // فوریت (تسلط پایین)
  const urgency = (1 - p) * (1 / Math.log(toExam + 2));
  // پاداش RL (حداکثر در ناحیه طلایی)
  let rl = 0;
  if (p >= REWARD_ZONE[0] && p <= REWARD_ZONE[1]) {
    rl = 1 - 4 * Math.pow(p - 0.725, 2); // حداکثر در 0.725
  }
  // ضرورت مرور (فراموشی)
  const reviewNeed = Math.min(1, daysSince / (2 + (topic.alpha || ALPHA_DEFAULT)*3));
  return 0.5 * urgency + 0.35 * rl + 0.15 * reviewNeed;
}

// پیشنهاد مطالعه ترکیبی (MDL)
function mdlSuggestion(selected, all) {
  const catMap = {};
  selected.forEach(t => {
    if (!catMap[t.cat]) catMap[t.cat] = [];
    catMap[t.cat].push(t);
  });
  let sug = '';
  for (let cat in catMap) {
    if (catMap[cat].length >= 2) {
      sug += `💡 مباحث ${catMap[cat][0].name} و ${catMap[cat][1].name} را پشت‌سرهم بخوان (فشرده‌سازی). `;
    }
  }
  return sug;
}

// ======================== تولید برنامه امروز (رایگان) ========================
function generateTodayPlan(totalMin = 180) {
  if (topics.length === 0 || !examDate) return null;
  const now = Date.now();
  const items = topics.map(t => ({topic: t, pri: priority(t, now)}));
  items.sort((a,b) => b.pri - a.pri);
  // حذف مباحث با تسلط بالای ۰٫۹۵ و مرور نشده در ۳۰ روز اخیر
  const filtered = items.filter(x => {
    const p = decayedMastery(x.topic, now);
    return p < 0.95 || (x.topic.lastStudy && (now - x.topic.lastStudy)/86400000 > 30);
  });
  if (filtered.length === 0) return {plan:[], msg:'همه مباحث عالی هستند. فقط مرور سریع.'};
  const top = filtered.slice(0, 8);
  const sumPri = top.reduce((s,x) => s + x.pri, 0);
  const plan = top.map(x => ({
    topic: x.topic,
    min: Math.max(15, Math.round((x.pri/sumPri) * totalMin))
  }));
  const selTopics = plan.map(p => p.topic);
  const mdl = mdlSuggestion(selTopics, topics);
  return {plan, mdl};
}

// ======================== تولید نقشه راه تا کنکور (پریمیوم) ========================
function generateRoadmap() {
  if (!examDate || topics.length === 0) return [];
  const now = Date.now();
  const end = new Date(examDate).getTime();
  const days = Math.ceil((end - now) / 86400000);
  if (days <= 0) return [];
  // کپی عمیق از topics برای شبیه‌سازی
  const sim = topics.map(t => ({...t, mastery: t.mastery, lastStudy: t.lastStudy, alpha: t.alpha, gamma: t.gamma}));
  const schedule = [];
  for (let d = 0; d < days; d++) {
    const currentTime = now + d * 86400000;
    // اولویت‌بندی
    const ranked = sim.map(t => ({topic: t, pri: priority(t, currentTime)}));
    ranked.sort((a,b) => b.pri - a.pri);
    // انتخاب ۵ مبحث برتر
    const selected = ranked.slice(0, 5).filter(x => {
      const p = decayedMastery(x.topic, currentTime);
      return p < 0.95; // از قبل مسلط را نخوان
    });
    if (selected.length === 0) continue;
    // شبیه‌سازی مطالعه: فرض می‌کنیم همه را درست جواب دهد (خوش‌بینانه)
    selected.forEach(s => {
      const t = s.topic;
      // مطالعه: یک مرور موفق با rt=2
      const cur = decayedMastery(t, currentTime);
      t.mastery = Math.min(0.99, bayesUpdate(cur, true, 2));
      t.lastStudy = currentTime;
    });
    schedule.push({
      day: d+1,
      date: new Date(currentTime).toLocaleDateString('fa-IR'),
      topics: selected.map(s => s.topic.name)
    });
  }
  return schedule;
}

// ======================== ذخیره و بازیابی ========================
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(topics));
}
function exportData() {
  const data = { topics, examDate, exportDate: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'konkoor_backup.json';
  a.click();
}
function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.topics) topics = data.topics;
      if (data.examDate) { examDate = data.examDate; localStorage.setItem('examDate', examDate); }
      saveData();
      renderActiveTab();
    } catch (err) { alert('فایل نامعتبر است.'); }
  };
  reader.readAsText(file);
}

// ======================== رابط کاربری ========================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  renderActiveTab();
}

function renderActiveTab() {
  const content = document.getElementById('tabContent');
  const active = document.querySelector('.tab-btn.active').id;
  if (active === 'tabInput') renderInputTab(content);
  else if (active === 'tabToday') renderTodayTab(content);
  else if (active === 'tabPremium') renderPremiumTab(content);
}

// تب ورود اطلاعات
function renderInputTab(container) {
  const daysLeft = examDate ? Math.ceil((new Date(examDate)-Date.now())/86400000) : '—';
  container.innerHTML = `
    <div class="grid md:grid-cols-2 gap-6">
      <div>
        <h2 class="text-xl font-bold mb-3">📚 مدیریت مباحث</h2>
        <div class="flex gap-2 mb-3">
          <input id="newName" placeholder="نام مبحث" class="border rounded px-3 py-2 flex-1">
          <select id="newCat" class="border rounded px-3 py-2">
            <option>ریاضی</option><option>فیزیک</option><option>شیمی</option><option>زیست</option><option>عمومی</option>
          </select>
          <input id="newMastery" type="number" min="0" max="100" value="50" class="border rounded px-2 py-2 w-20" placeholder="%">
          <button onclick="addTopic()" class="bg-indigo-600 text-white px-4 py-2 rounded">➕</button>
        </div>
        <button onclick="loadDefaults()" class="bg-green-600 text-white px-4 py-2 rounded mb-3">📋 بارگذاری مباحث کنکور</button>
        <div class="flex gap-2 text-sm">
          <button onclick="exportData()" class="bg-gray-200 px-3 py-1 rounded">💾 خروجی JSON</button>
          <label class="bg-gray-200 px-3 py-1 rounded cursor-pointer">📂 ورودی JSON<input type="file" accept=".json" onchange="importData(this.files[0])" hidden></label>
        </div>
        <div class="mt-4 max-h-96 overflow-y-auto border rounded p-2">
          ${renderTopicsTable()}
        </div>
      </div>
      <div>
        <h2 class="text-xl font-bold mb-3">📅 تنظیمات</h2>
        <label class="block mb-2">تاریخ کنکور:</label>
        <input type="date" id="examInput" value="${examDate}" class="border rounded px-3 py-2 mb-2 w-full">
        <button onclick="setExamDate()" class="bg-indigo-600 text-white px-4 py-2 rounded">ذخیره</button>
        <p class="mt-2 text-gray-600">روزهای باقی‌مانده: <span class="font-bold">${daysLeft}</span></p>
        <div class="mt-6 p-3 bg-yellow-50 rounded border border-yellow-200">
          <p class="font-semibold text-yellow-800">⭐ وضعیت پریمیوم: ${premium ? 'فعال' : 'غیرفعال'}</p>
          ${!premium ? '<input id="premCode" placeholder="کد پریمیوم" class="border rounded px-2 py-1 mt-2"><button onclick="activatePremium()" class="bg-yellow-500 text-white px-3 py-1 rounded mr-2">فعال‌سازی</button><p class="text-xs text-gray-500 mt-1">کد آزمایشی: KONKOOR1404</p>' : ''}
        </div>
      </div>
    </div>
  `;
}

function renderTopicsTable() {
  if (topics.length === 0) return '<p class="text-gray-400">هنوز مبحثی اضافه نشده.</p>';
  const now = Date.now();
  return `<table class="w-full text-sm"><thead><tr class="bg-gray-100"><th>مبحث</th><th>دسته</th><th>تسلط</th><th>آخرین مرور</th><th>ثبت تمرین</th><th></th></tr></thead><tbody>
    ${topics.map(t => {
      const p = decayedMastery(t, now);
      const last = t.lastStudy ? new Date(t.lastStudy).toLocaleDateString('fa-IR') : 'هیچوقت';
      return `<tr>
        <td>${t.name}</td><td>${t.cat}</td><td>${(p*100).toFixed(1)}%</td><td>${last}</td>
        <td><button onclick="log('${t.name}',true)" class="bg-green-100 text-green-700 px-2 py-0.5 rounded">✓</button>
        <button onclick="log('${t.name}',false)" class="bg-red-100 text-red-700 px-2 py-0.5 rounded">✗</button></td>
        <td><button onclick="deleteTopic('${t.name}')" class="text-red-500">✕</button></td>
      </tr>`;
    }).join('')}
  </tbody></table>`;
}

// تب برنامه امروز
function renderTodayTab(container) {
  if (!examDate || topics.length === 0) {
    container.innerHTML = '<p class="text-gray-500">ابتدا تاریخ کنکور را تنظیم و حداقل یک مبحث اضافه کنید.</p>';
    return;
  }
  const plan = generateTodayPlan();
  if (!plan || plan.plan.length === 0) {
    container.innerHTML = '<p class="text-green-600 font-semibold">آفرین! همه مباحث در وضعیت مطلوب هستند. امروز استراحت یا مرور سریع.</p>';
    return;
  }
  container.innerHTML = `
    <h2 class="text-2xl font-bold text-green-700 mb-4">📅 برنامه امروز شما</h2>
    <ul class="space-y-3">
      ${plan.plan.map(p => `<li class="flex justify-between border-b pb-1"><span class="font-medium">${p.topic.name} (${p.topic.cat})</span><span>${p.min} دقیقه</span></li>`).join('')}
    </ul>
    ${plan.mdl ? `<div class="mt-4 p-3 bg-blue-50 rounded text-blue-800">${plan.mdl}</div>` : ''}
    <p class="text-xs text-gray-400 mt-4">بر اساس مدل ACT‑R، یادگیری تقویتی و اصل فشرده‌سازی.</p>
  `;
}

// تب پریمیوم
function renderPremiumTab(container) {
  if (!premium) {
    container.innerHTML = `<div class="text-center py-10">
      <p class="text-xl text-gray-500">برای مشاهده تحلیل پیشرفته و نقشه راه، پریمیوم را فعال کنید.</p>
      <input id="premCode2" placeholder="کد پریمیوم" class="border rounded px-3 py-2 mt-3">
      <button onclick="activatePremium()" class="bg-yellow-500 text-white px-4 py-2 rounded">فعال‌سازی</button>
      <p class="text-xs text-gray-400 mt-2">کد آزمایشی: KONKOOR1404</p>
    </div>`;
    return;
  }
  const roadmap = generateRoadmap();
  const now = Date.now();
  const daysLeft = examDate ? Math.ceil((new Date(examDate)-now)/86400000) : 0;
  // نمودار تسلط پیش‌بینی
  container.innerHTML = `
    <h2 class="text-2xl font-bold text-yellow-700 mb-4">⭐ نقشهٔ راه کامل تا کنکور (پریمیوم)</h2>
    <p class="mb-2 text-sm text-gray-600">تعداد روز تا کنکور: <span class="font-bold">${daysLeft}</span> | تعداد مباحث: ${topics.length}</p>
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <canvas id="masteryChart" width="300" height="200"></canvas>
      </div>
      <div class="max-h-64 overflow-y-auto border rounded p-2 text-sm">
        <h3 class="font-bold mb-2">برنامه روزهای آینده (۵ مبحث اول هر روز)</h3>
        ${roadmap.slice(0, 10).map(d => `<p class="mb-1"><span class="font-semibold">روز ${d.day} (${d.date}):</span> ${d.topics.join('، ')}</p>`).join('')}
        ${roadmap.length > 10 ? '<p class="text-gray-400">...</p>' : ''}
      </div>
    </div>
    <div class="mt-4 text-xs text-gray-500">نمودار تسلط بر اساس شبیه‌سازی با فرض مطالعهٔ منظم و پاسخ صحیح.</div>
  `;
  // رسم نمودار
  setTimeout(() => {
    const ctx = document.getElementById('masteryChart')?.getContext('2d');
    if (!ctx) return;
    const daysToPlot = Math.min(daysLeft, 30);
    const labels = [];
    const datasets = [];
    for (let t of topics) {
      const data = [];
      let p = t.mastery;
      let last = t.lastStudy;
      for (let d = 0; d <= daysToPlot; d++) {
        const simDate = now + d*86400000;
        // هر ۲ روز یک مرور موفق
        if (d % 2 === 0 && d>0) {
          p = bayesUpdate(p, true, 2);
          last = simDate;
        }
        if (last) {
          const dt = (simDate - last)/86400000;
          p = p / Math.pow(1 + (t.gamma||GAMMA_DEFAULT)*dt, (t.alpha||ALPHA_DEFAULT));
        }
        data.push((p*100).toFixed(1));
      }
      datasets.push({
        label: t.name,
        data,
        borderColor: `hsl(${Math.random()*360},70%,50%)`,
        fill: false,
        tension: 0.2
      });
      labels.push(d===0 ? 'امروز' : `روز ${d}`);
    }
    new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: { responsive: true, scales: { y: { min:0, max:100 } } }
    });
  }, 100);
}

// عملیات رابط
function addTopic() {
  const name = document.getElementById('newName').value.trim();
  const cat = document.getElementById('newCat').value;
  const mast = parseInt(document.getElementById('newMastery').value) || 50;
  if (!name) return alert('نام را وارد کنید.');
  if (topics.find(t => t.name === name)) return alert('تکراری است.');
  topics.push({ name, cat, mastery: mast/100, lastStudy: null, alpha: ALPHA_DEFAULT, gamma: GAMMA_DEFAULT, history: [] });
  saveData();
  renderActiveTab();
}
function deleteTopic(name) {
  topics = topics.filter(t => t.name !== name);
  saveData();
  renderActiveTab();
}
function log(name, correct) {
  const t = topics.find(t => t.name === name);
  if (t) study(t, correct, correct ? 2 : 4);
  renderActiveTab();
}
function setExamDate() {
  examDate = document.getElementById('examInput').value;
  localStorage.setItem('examDate', examDate);
  renderActiveTab();
}
function activatePremium() {
  const code = (document.getElementById('premCode')?.value || document.getElementById('premCode2')?.value || '').trim();
  if (code === 'KONKOOR1404') {
    premium = true;
    localStorage.setItem(PREMIUM_KEY, 'true');
    renderActiveTab();
  } else alert('کد اشتباه است.');
}
function loadDefaults() {
  if (topics.length > 0 && !confirm('مباحث فعلی حذف شوند؟')) return;
  topics = DEFAULT_TOPICS.map(t => ({
    ...t,
    mastery: 0.5,
    lastStudy: null,
    alpha: ALPHA_DEFAULT,
    gamma: GAMMA_DEFAULT,
    history: []
  }));
  saveData();
  renderActiveTab();
}

// شروع
window.onload = () => switchTab('input');
</script>
